[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gemma-chall-a10g"
version = "0.1.0"
description = "Small AWS EC2 A10G launcher for Gemma experiments."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "boto3>=1.34",
    "python-dotenv>=1.0",
    "huggingface-hub>=0.27.0",
]

[project.scripts]
a10g = "a10g_node.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/a10g_node"]
